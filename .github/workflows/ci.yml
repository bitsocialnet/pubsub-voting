name: CI
on:
  push:
    paths:
      [
        "src/**",
        "examples/**",
        "package.json",
        "package-lock.json",
        "tsconfig.json",
        "tsconfig.examples.json",
        "vitest.config.ts",
        "vitest.integration.config.ts",
        ".github/**",
      ]
  pull_request:
    paths:
      [
        "src/**",
        "examples/**",
        "package.json",
        "package-lock.json",
        "tsconfig.json",
        "tsconfig.examples.json",
        "vitest.config.ts",
        "vitest.integration.config.ts",
        ".github/**",
      ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:examples
      - run: npm run build
      # Unit suite with V8 coverage; the thresholds in vitest.config.ts fail the run if
      # coverage regresses below the pinned baseline.
      - run: npm run test:coverage
      # Two-node gossipsub integration test (real libp2p + Helia on loopback),
      # excluded from the unit suite. Runs here so releases gate on it too.
      - run: npm run test:integration
